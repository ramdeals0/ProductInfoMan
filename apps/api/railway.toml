# Railway config for the API service.
# In Railway: Service → Settings → Config-as-code → /apps/api/railway.toml
# Keep the project root directory empty (repo root) so pnpm workspace resolves.

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm db:generate"
watchPatterns = [
  "apps/api/**",
  "packages/**",
  "prisma/**",
  "generated/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
# Migrations are being consolidated; db push syncs the full Prisma schema on deploy.
preDeployCommand = "pnpm db:generate && pnpm exec prisma db push --skip-generate"
startCommand = "pnpm --filter @productinfoman/api start:railway"
healthcheckPath = "/health/ready"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
