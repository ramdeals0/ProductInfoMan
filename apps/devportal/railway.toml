# Railway config for the Developer Portal (Next.js).
# In Railway: Service → Settings → Config-as-code → /apps/devportal/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-https://pim-api.up.railway.app/api/v1} NEXT_PUBLIC_ADMIN_URL=${NEXT_PUBLIC_ADMIN_URL:-https://pim-admin.up.railway.app} NEXT_PUBLIC_STOREFRONT_URL=${NEXT_PUBLIC_STOREFRONT_URL:-https://pim-store.up.railway.app} NEXT_PUBLIC_DEFAULT_ORG_SLUG=${NEXT_PUBLIC_DEFAULT_ORG_SLUG:-demo} pnpm --filter @productinfoman/devportal build"
watchPatterns = [
  "apps/devportal/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = "pnpm --filter @productinfoman/devportal start"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
