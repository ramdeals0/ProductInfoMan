# Railway config for the Developer Portal (Next.js).
# In Railway: Service → Settings → Config-as-code → /apps/devportal/railway.toml

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @productinfoman/devportal build"
watchPatterns = [
  "apps/devportal/**",
  "package.json",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
startCommand = "pnpm --filter @productinfoman/devportal start"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
